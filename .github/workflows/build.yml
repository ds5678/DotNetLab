name: Build

on:
  workflow_dispatch:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  build_linux:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup

      - name: Build
        run: dotnet build -warnaserror -p:TreatWarningsAsErrors=true

      - name: Upload everything
        uses: actions/upload-artifact@v6
        with:
          name: DotNetLab_Linux
          path: ./artifacts/bin
  build_windows:
    runs-on: windows-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup

      - name: Build
        run: dotnet build -warnaserror -p:TreatWarningsAsErrors=true

      - name: Upload everything
        uses: actions/upload-artifact@v6
        with:
          name: DotNetLab_Windows
          path: ./artifacts/bin
